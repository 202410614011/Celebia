<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Celebia | Kesfet</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #f8f4ec;
			--bg-soft: #fffaf1;
			--paper: #ffffff;
			--ink: #1d2a2a;
			--muted: #5a6b6b;
			--brand: #ff7a18;
			--brand-deep: #db5e00;
			--accent: #0ea5a0;
			--line: #e8ded0;
			--shadow: 0 18px 40px rgba(18, 29, 29, 0.14);
			--radius-lg: 22px;
			--radius-md: 14px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: "Manrope", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 8% 10%, #ffedd5 0%, transparent 35%),
				radial-gradient(circle at 95% 0%, #dff8f5 0%, transparent 28%),
				linear-gradient(180deg, var(--bg-soft), var(--bg));
			min-height: 100vh;
			padding: 24px;
		}

		.page {
			max-width: 1180px;
			margin: 0 auto;
			animation: rise 0.8s ease-out both;
		}

		.hero {
			display: grid;
			grid-template-columns: 1.2fr 1fr;
			gap: 24px;
			align-items: stretch;
			margin-bottom: 28px;
		}

		.brand-card,
		.filters {
			background: var(--paper);
			border: 1px solid var(--line);
			border-radius: var(--radius-lg);
			box-shadow: var(--shadow);
			padding: 24px;
		}

		.brand-row {
			display: flex;
			align-items: center;
			gap: 14px;
			margin-bottom: 16px;
		}

		.logo {
			width: 58px;
			height: 58px;
			border-radius: 14px;
			object-fit: cover;
			border: 2px solid #ffe3cc;
			background: #fff4e9;
		}

		h1 {
			font-size: clamp(1.5rem, 2.8vw, 2.2rem);
			line-height: 1.2;
			letter-spacing: -0.02em;
			font-family: "Playfair Display", serif;
		}

		.subtitle {
			color: var(--muted);
			line-height: 1.6;
			margin-bottom: 16px;
		}

		.chip-row {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.chip {
			background: #fff4e9;
			color: #9d4c08;
			border: 1px solid #ffd7b5;
			border-radius: 999px;
			padding: 7px 12px;
			font-size: 0.86rem;
			font-weight: 700;
		}

		.filters {
			display: grid;
			gap: 14px;
			align-content: center;
		}

		label {
			font-size: 0.9rem;
			font-weight: 700;
			color: #304445;
		}

		select,
		button {
			width: 100%;
			border: 1px solid #d7cdbf;
			border-radius: var(--radius-md);
			padding: 12px 14px;
			font-size: 0.98rem;
			font-family: inherit;
		}

		select {
			background: #fffdf8;
			color: #223233;
			outline: none;
			transition: border 0.2s ease, box-shadow 0.2s ease;
		}

		select:focus {
			border-color: #ffa86f;
			box-shadow: 0 0 0 4px rgba(255, 122, 24, 0.13);
		}

		.btn {
			background: linear-gradient(135deg, var(--brand), var(--brand-deep));
			color: #fff;
			font-weight: 800;
			border: none;
			cursor: pointer;
			transition: transform 0.2s ease, filter 0.2s ease;
		}

		.btn:hover {
			transform: translateY(-1px);
			filter: brightness(1.04);
		}

		.grid-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 12px 2px 14px;
		}

		.grid-head h2 {
			font-size: 1.25rem;
			font-weight: 800;
			letter-spacing: -0.01em;
		}

		.count {
			color: var(--muted);
			font-weight: 700;
			font-size: 0.9rem;
		}

		.cards {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
			gap: 16px;
		}

		.card {
			border: 1px solid var(--line);
			background: var(--paper);
			border-radius: 16px;
			overflow: hidden;
			box-shadow: 0 8px 22px rgba(17, 25, 26, 0.1);
			cursor: pointer;
			transform: translateY(0);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			animation: fadeUp 0.55s ease both;
		}

		.card:hover {
			transform: translateY(-4px);
			box-shadow: 0 16px 26px rgba(17, 25, 26, 0.18);
		}

		.card img {
			width: 100%;
			height: 165px;
			object-fit: cover;
			display: block;
		}

		.card-body {
			padding: 14px;
			display: grid;
			gap: 8px;
		}

		.card-body h3 {
			font-size: 1.04rem;
			letter-spacing: -0.01em;
		}

		.meta {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			color: #3c4e4f;
			font-size: 0.86rem;
			font-weight: 700;
		}

		.meta span {
			background: #eef9f8;
			color: #0d6662;
			border: 1px solid #d2efec;
			border-radius: 999px;
			padding: 5px 10px;
		}

		.desc {
			color: #5a6b6b;
			font-size: 0.91rem;
			line-height: 1.5;
		}

		.empty {
			padding: 26px;
			background: #fff;
			border-radius: 14px;
			border: 1px dashed #d4cbc0;
			color: #516566;
			text-align: center;
			font-weight: 600;
		}

		.modal {
			position: fixed;
			inset: 0;
			background: rgba(17, 25, 26, 0.58);
			display: none;
			place-items: center;
			padding: 18px;
			z-index: 20;
		}

		.modal.active {
			display: grid;
		}

		.modal-card {
			width: min(760px, 100%);
			max-height: 92vh;
			overflow: auto;
			background: #fffefb;
			border-radius: 18px;
			border: 1px solid #e7ddcf;
			box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
			animation: pop 0.25s ease both;
		}

		.modal-card img {
			width: 100%;
			height: 280px;
			object-fit: cover;
		}

		.modal-content {
			padding: 18px 18px 20px;
			display: grid;
			gap: 12px;
		}

		.modal-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}

		.modal-top h3 {
			font-size: 1.35rem;
			letter-spacing: -0.01em;
		}

		.close {
			width: 38px;
			height: 38px;
			border-radius: 50%;
			border: 1px solid #d8cec2;
			background: #fff;
			font-size: 1.4rem;
			line-height: 1;
			cursor: pointer;
			color: #334849;
		}

		.info-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
			font-size: 0.95rem;
		}

		.info {
			background: #fff;
			border: 1px solid #eadfce;
			border-radius: 12px;
			padding: 10px;
		}

		.info b {
			display: block;
			color: #6f4f31;
			margin-bottom: 4px;
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.tags {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.tag {
			border-radius: 999px;
			border: 1px solid #d6eeeb;
			background: #f0fbfa;
			color: #135f5c;
			font-size: 0.84rem;
			font-weight: 700;
			padding: 6px 10px;
		}

		.error {
			margin-top: 10px;
			color: #8a2b2b;
			font-size: 0.9rem;
			font-weight: 700;
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(12px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes pop {
			from {
				opacity: 0;
				transform: scale(0.97);
			}
			to {
				opacity: 1;
				transform: scale(1);
			}
		}

		@media (max-width: 900px) {
			body {
				padding: 16px;
			}

			.hero {
				grid-template-columns: 1fr;
			}

			.modal-card img {
				height: 220px;
			}
		}

		@media (max-width: 560px) {
			.info-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="page">
		<section class="hero">
			<article class="brand-card">
				<div class="brand-row">
					<img class="logo" src="Celebia.jpeg" alt="Celebia logosu" />
					<h1>Celebia ile Sehrini Kesfet</h1>
				</div>
				<p class="subtitle">
					Il ve kategori sec, sana en uygun mekanlari tek ekranda gor.
					Fotograflari incele, kartlara tiklayip ayrintili bilgilere ulas.
				</p>
				<div class="chip-row">
					<span class="chip">Plaj</span>
					<span class="chip">Kamp(Doga)</span>
					<span class="chip">Kulturel(Tarihi)</span>
					<span class="chip">Eglence Mekanlari</span>
				</div>
			</article>

			<section class="filters">
				<label for="citySelect">Il Sec</label>
				<select id="citySelect">
					<option value="">Tum Iller</option>
				</select>

				<label for="categorySelect">Kategori Sec</label>
				<select id="categorySelect">
					<option value="">Tum Kategoriler</option>
					<option value="Plaj">Plaj</option>
					<option value="Kamp(Doğa)">Kamp(Doga)</option>
					<option value="Kültürel(Tarihi)">Kulturel(Tarihi)</option>
					<option value="Eğlence Mekanları">Eglence Mekanlari</option>
				</select>

				<button id="filterBtn" class="btn" type="button">Mekanlari Goster</button>
				<p id="errorBox" class="error" aria-live="polite"></p>
			</section>
		</section>

		<section>
			<div class="grid-head">
				<h2>Onerilen Mekanlar</h2>
				<span class="count" id="countText">0 sonuc</span>
			</div>
			<div class="cards" id="cards"></div>
		</section>
	</main>

	<aside id="detailModal" class="modal" aria-hidden="true">
		<div class="modal-card">
			<img id="modalImage" src="" alt="Mekan gorseli" />
			<div class="modal-content">
				<div class="modal-top">
					<h3 id="modalTitle"></h3>
					<button id="closeModal" class="close" type="button" aria-label="Kapat">&times;</button>
				</div>
				<div class="info-grid">
					<div class="info"><b>Il</b><span id="modalCity"></span></div>
					<div class="info"><b>Kategori</b><span id="modalCategory"></span></div>
					<div class="info"><b>Puan</b><span id="modalScore"></span></div>
					<div class="info"><b>En Iyi Zaman</b><span id="modalSeason"></span></div>
				</div>
				<div class="info"><b>Adres</b><span id="modalAddress"></span></div>
				<p id="modalDescription" class="desc"></p>
				<div class="tags" id="modalTags"></div>
			</div>
		</div>
	</aside>

	<script>
		const citySelect = document.getElementById("citySelect");
		const categorySelect = document.getElementById("categorySelect");
		const filterBtn = document.getElementById("filterBtn");
		const cardsContainer = document.getElementById("cards");
		const countText = document.getElementById("countText");
		const errorBox = document.getElementById("errorBox");

		const detailModal = document.getElementById("detailModal");
		const closeModal = document.getElementById("closeModal");

		const modalImage = document.getElementById("modalImage");
		const modalTitle = document.getElementById("modalTitle");
		const modalCity = document.getElementById("modalCity");
		const modalCategory = document.getElementById("modalCategory");
		const modalScore = document.getElementById("modalScore");
		const modalSeason = document.getElementById("modalSeason");
		const modalAddress = document.getElementById("modalAddress");
		const modalDescription = document.getElementById("modalDescription");
		const modalTags = document.getElementById("modalTags");

		let allPlaces = [];

		function updateCount(value) {
			const text = value === 1 ? "1 sonuc" : `${value} sonuc`;
			countText.textContent = text;
		}

		function createCard(place, index) {
			const card = document.createElement("article");
			card.className = "card";
			card.style.animationDelay = `${Math.min(index * 0.06, 0.5)}s`;
			card.innerHTML = `
				<img src="${place.kapakFoto}" alt="${place.ad}" loading="lazy">
				<div class="card-body">
					<h3>${place.ad}</h3>
					<div class="meta">
						<span>${place.il}</span>
						<span>${place.kategori}</span>
					</div>
					<p class="desc">${place.ozet}</p>
				</div>
			`;
			card.addEventListener("click", () => openModal(place));
			return card;
		}

		function renderPlaces(list) {
			cardsContainer.innerHTML = "";
			updateCount(list.length);

			if (!list.length) {
				cardsContainer.innerHTML = '<div class="empty">Secimlerine uygun mekan bulunamadi.</div>';
				return;
			}

			list.forEach((place, index) => {
				cardsContainer.appendChild(createCard(place, index));
			});
		}

		function filterPlaces() {
			const city = citySelect.value;
			const category = categorySelect.value;

			const filtered = allPlaces.filter((place) => {
				const cityMatch = !city || place.il === city;
				const categoryMatch = !category || place.kategori === category;
				return cityMatch && categoryMatch;
			});

			renderPlaces(filtered);
		}

		function fillCityOptions(places) {
			const cities = [...new Set(places.map((place) => place.il))].sort((a, b) => a.localeCompare(b, "tr"));
			cities.forEach((city) => {
				const opt = document.createElement("option");
				opt.value = city;
				opt.textContent = city;
				citySelect.appendChild(opt);
			});
		}

		function openModal(place) {
			modalImage.src = place.kapakFoto;
			modalImage.alt = `${place.ad} gorseli`;
			modalTitle.textContent = place.ad;
			modalCity.textContent = place.il;
			modalCategory.textContent = place.kategori;
			modalScore.textContent = `${place.puan} / 5`;
			modalSeason.textContent = place.enIyiZaman;
			modalAddress.textContent = place.adres;
			modalDescription.textContent = place.aciklama;

			modalTags.innerHTML = "";
			(place.etkinlikler || []).forEach((item) => {
				const span = document.createElement("span");
				span.className = "tag";
				span.textContent = item;
				modalTags.appendChild(span);
			});

			detailModal.classList.add("active");
			detailModal.setAttribute("aria-hidden", "false");
		}

		function closeDetailModal() {
			detailModal.classList.remove("active");
			detailModal.setAttribute("aria-hidden", "true");
		}

		async function loadData() {
			try {
				const response = await fetch("veri.json", { cache: "no-store" });
				if (!response.ok) {
					throw new Error(`Veri alinamadi: ${response.status}`);
				}
				allPlaces = await response.json();
				fillCityOptions(allPlaces);
				renderPlaces(allPlaces);
			} catch (error) {
				errorBox.textContent = "veri.json yuklenemedi. Dosyalari bir local server ile acmayi dene (ornek: Live Server).";
				renderPlaces([]);
			}
		}

		filterBtn.addEventListener("click", filterPlaces);
		citySelect.addEventListener("change", filterPlaces);
		categorySelect.addEventListener("change", filterPlaces);

		closeModal.addEventListener("click", closeDetailModal);
		detailModal.addEventListener("click", (event) => {
			if (event.target === detailModal) {
				closeDetailModal();
			}
		});
		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape") {
				closeDetailModal();
			}
		});

		loadData();
	</script>
</body>
</html>
