<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Celebia | Kesfet</title>
	<link rel="icon" type="image/jpeg" href="Celebia.jpeg" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #f8f4ec;
			--bg-soft: #fffaf1;
			--paper: #ffffff;
			--ink: #1d2a2a;
			--muted: #5a6b6b;
			--brand: #ff7a18;
			--brand-deep: #db5e00;
			--accent: #0ea5a0;
			--line: #e8ded0;
			--shadow: 0 18px 40px rgba(18, 29, 29, 0.14);
			--radius-lg: 22px;
			--radius-md: 14px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: "Manrope", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 8% 10%, #ffedd5 0%, transparent 35%),
				radial-gradient(circle at 95% 0%, #dff8f5 0%, transparent 28%),
				linear-gradient(180deg, var(--bg-soft), var(--bg));
			min-height: 100vh;
			padding: 24px;
		}

		.page {
			max-width: 1180px;
			margin: 0 auto;
			animation: rise 0.8s ease-out both;
		}

		.site-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 18px;
			padding: 10px 14px;
			background: rgba(255, 255, 255, 0.75);
			backdrop-filter: blur(14px);
			border: 1px solid rgba(232, 222, 208, 0.9);
			border-radius: 999px;
			box-shadow: 0 10px 28px rgba(18, 29, 29, 0.08);
		}

		.site-brand {
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 0;
		}

		.site-logo {
			width: 34px;
			height: 34px;
			border-radius: 10px;
			object-fit: cover;
			border: 1px solid #ffd9b8;
			flex: 0 0 auto;
		}

		.site-name {
			font-weight: 800;
			letter-spacing: -0.02em;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.lang-selector {
			display: flex;
			gap: 8px;
			align-items: center;
		}

		.lang-selector label {
			font-size: 0.9rem;
			font-weight: 700;
			margin: 0;
		}

		.lang-selector select {
			width: auto;
			padding: 8px 12px;
			font-size: 0.9rem;
			background: #fffdf8;
			color: #223233;
			border: 1px solid #d7cdbf;
			cursor: pointer;
			outline: none;
			transition: border 0.2s ease;
		}

		.lang-selector select:focus {
			border-color: #ffa86f;
		}

		.hero {
			display: grid;
			grid-template-columns: 1.2fr 1fr;
			gap: 24px;
			align-items: stretch;
			margin-bottom: 28px;
		}

		.brand-card,
		.filters {
			background: var(--paper);
			border: 1px solid var(--line);
			border-radius: var(--radius-lg);
			box-shadow: var(--shadow);
			padding: 24px;
		}

		.brand-row {
			display: flex;
			align-items: center;
			gap: 14px;
			margin-bottom: 16px;
		}

		.logo {
			width: 70px;
			height: 70px;
			border-radius: 14px;
			object-fit: cover;
			border: 2px solid #ffe3cc;
			background: #fff4e9;
		}

		h1 {
			font-size: clamp(1.5rem, 2.8vw, 2.2rem);
			line-height: 1.2;
			letter-spacing: -0.02em;
			font-family: "Playfair Display", serif;
		}

		.subtitle {
			color: var(--muted);
			line-height: 1.6;
			margin-bottom: 16px;
		}

		.chip-row {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.chip {
			background: #fff4e9;
			color: #9d4c08;
			border: 1px solid #ffd7b5;
			border-radius: 999px;
			padding: 7px 12px;
			font-size: 0.86rem;
			font-weight: 700;
		}

		.filters {
			display: grid;
			gap: 14px;
			align-content: center;
		}

		label {
			font-size: 0.9rem;
			font-weight: 700;
			color: #304445;
		}

		select,
		button {
			width: 100%;
			border: 1px solid #d7cdbf;
			border-radius: var(--radius-md);
			padding: 12px 14px;
			font-size: 0.98rem;
			font-family: inherit;
		}

		select {
			background: #fffdf8;
			color: #223233;
			outline: none;
			transition: border 0.2s ease, box-shadow 0.2s ease;
		}

		select:focus {
			border-color: #ffa86f;
			box-shadow: 0 0 0 4px rgba(255, 122, 24, 0.13);
		}

		.btn {
			background: linear-gradient(135deg, var(--brand), var(--brand-deep));
			color: #fff;
			font-weight: 800;
			border: none;
			cursor: pointer;
			transition: transform 0.2s ease, filter 0.2s ease;
		}

		.btn:hover {
			transform: translateY(-1px);
			filter: brightness(1.04);
		}

		.grid-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 12px 2px 14px;
		}

		.grid-head h2 {
			font-size: 1.25rem;
			font-weight: 800;
			letter-spacing: -0.01em;
		}

		.count {
			color: var(--muted);
			font-weight: 700;
			font-size: 0.9rem;
		}

		.cards {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
			gap: 16px;
		}

		.card {
			border: 1px solid var(--line);
			background: var(--paper);
			border-radius: 16px;
			overflow: hidden;
			box-shadow: 0 8px 22px rgba(17, 25, 26, 0.1);
			cursor: pointer;
			transform: translateY(0);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			animation: fadeUp 0.55s ease both;
		}

		.card:hover {
			transform: translateY(-4px);
			box-shadow: 0 16px 26px rgba(17, 25, 26, 0.18);
		}

		.card img {
			width: 100%;
			height: 165px;
			object-fit: cover;
			display: block;
		}

		.card-body {
			padding: 14px;
			display: grid;
			gap: 8px;
		}

		.card-body h3 {
			font-size: 1.04rem;
			letter-spacing: -0.01em;
		}

		.meta {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			color: #3c4e4f;
			font-size: 0.86rem;
			font-weight: 700;
		}

		.meta span {
			background: #eef9f8;
			color: #0d6662;
			border: 1px solid #d2efec;
			border-radius: 999px;
			padding: 5px 10px;
		}

		.empty {
			padding: 26px;
			background: #fff;
			border-radius: 14px;
			border: 1px dashed #d4cbc0;
			color: #516566;
			text-align: center;
			font-weight: 600;
		}

		.modal {
			position: fixed;
			inset: 0;
			background: rgba(17, 25, 26, 0.58);
			display: none;
			place-items: center;
			padding: 18px;
			z-index: 20;
		}

		.modal.active {
			display: grid;
		}

		.modal-card {
			width: min(760px, 100%);
			max-height: 92vh;
			overflow: auto;
			background: #fffefb;
			border-radius: 18px;
			border: 1px solid #e7ddcf;
			box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
			animation: pop 0.25s ease both;
		}

		.modal-card img {
			width: 100%;
			height: 280px;
			object-fit: cover;
		}

		.modal-content {
			padding: 18px 18px 20px;
			display: grid;
			gap: 12px;
		}

		.modal-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}

		.modal-top h3 {
			font-size: 1.35rem;
			letter-spacing: -0.01em;
		}

		.close {
			width: 38px;
			height: 38px;
			border-radius: 50%;
			border: 1px solid #d8cec2;
			background: #fff;
			font-size: 1.4rem;
			line-height: 1;
			cursor: pointer;
			color: #334849;
		}

		.info-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
			font-size: 0.95rem;
		}

		.info {
			background: #fff;
			border: 1px solid #eadfce;
			border-radius: 12px;
			padding: 10px;
		}

		.info b {
			display: block;
			color: #6f4f31;
			margin-bottom: 4px;
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.04em;
		}

		.tags {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.tag {
			border-radius: 999px;
			border: 1px solid #d6eeeb;
			background: #f0fbfa;
			color: #135f5c;
			font-size: 0.84rem;
			font-weight: 700;
			padding: 6px 10px;
		}

		.error {
			margin-top: 10px;
			color: #8a2b2b;
			font-size: 0.9rem;
			font-weight: 700;
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(12px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes pop {
			from {
				opacity: 0;
				transform: scale(0.97);
			}
			to {
				opacity: 1;
				transform: scale(1);
			}
		}

		@media (max-width: 900px) {
			body {
				padding: 16px;
			}

			.hero {
				grid-template-columns: 1fr;
			}

			.modal-card img {
				height: 220px;
			}
		}

		@media (max-width: 560px) {
			.info-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="page">
		<section class="site-bar">
			<div class="site-brand">
				<img class="site-logo" src="Celebia.jpeg" alt="Celebia" />
				<span class="site-name">Celebia</span>
			</div>
			<div class="lang-selector">
				<label for="langSelect">Dil:</label>
				<select id="langSelect">
					<option value="tr">Türkçe</option>
					<option value="en">English</option>
				</select>
			</div>
		</section>

		<section class="hero">
			<article class="brand-card">
				<div class="brand-row">
					<img class="logo" src="Celebia.jpeg" alt="Celebia logosu" />
					<h1 id="mainTitle">Celebia ile Sehrini Kesfet</h1>
				</div>
				<p class="subtitle" id="mainSubtitle">
					Il ve kategori sec, sana en uygun mekanlari tek ekranda gor.
					Fotograflari incele, kartlara tiklayip ayrintili bilgilere ulas.
				</p>
				<div class="chip-row">
					<span class="chip" data-label="beach">Plaj</span>
					<span class="chip" data-label="parks">Parklar</span>
					<span class="chip" data-label="cultural">Kulturel(Tarihi)</span>
					<span class="chip" data-label="entertainment">Eglence Mekanlari</span>
				</div>
			</article>

			<section class="filters">
				<label for="citySelect" id="cityLabel">Il Sec</label>
				<select id="citySelect">
					<option value="">Tum Iller</option>
				</select>

				<label for="categorySelect" id="categoryLabel">Kategori Sec</label>
				<select id="categorySelect">
					<option value="">Tum Kategoriler</option>
					<option value="Plaj">Plaj</option>
					<option value="Parklar">Parklar</option>
					<option value="Kültürel(Tarihi)">Kulturel(Tarihi)</option>
					<option value="Eğlence Mekanları">Eglence Mekanlari</option>
				</select>

				<button id="filterBtn" class="btn" type="button">Mekanlari Goster</button>
				<p id="errorBox" class="error" aria-live="polite"></p>
			</section>
		</section>

		<section>
			<div class="grid-head">
				<h2 id="suggestedTitle">Onerilen Mekanlar</h2>
				<span class="count" id="countText">0 sonuc</span>
			</div>
			<div class="cards" id="cards"></div>
		</section>
	</main>

	<aside id="detailModal" class="modal" aria-hidden="true">
		<div class="modal-card">
			<img id="modalImage" src="" alt="Mekan gorseli" />
			<div class="modal-content">
				<div class="modal-top">
					<h3 id="modalTitle"></h3>
					<button id="closeModal" class="close" type="button" aria-label="Kapat">&times;</button>
				</div>
				<div class="info-grid">
					<div class="info"><b id="labelCity">Il</b><span id="modalCity"></span></div>
					<div class="info"><b id="labelCategory">Kategori</b><span id="modalCategory"></span></div>
					<div class="info"><b id="labelSeason">En Iyi Zaman</b><span id="modalSeason"></span></div>
				</div>
				<div class="info"><b id="labelAddress">Adres</b><span id="modalAddress"></span></div>
				<p id="modalDescription" class="desc"></p>
				<div class="tags" id="modalTags"></div>
			</div>
		</div>
	</aside>

	<script>
		// Dil paketleri
		const translations = {
			tr: {
				mainTitle: "Celebia ile Sehrini Kesfet",
				mainSubtitle: "Il ve kategori sec, sana en uygun mekanlari tek ekranda gor. Fotograflari incele, kartlara tiklayip ayrintili bilgilere ulas.",
				cityLabel: "Il Sec",
				categoryLabel: "Kategori Sec",
				allCities: "Tum Iller",
				allCategories: "Tum Kategoriler",
				filterBtn: "Mekanlari Goster",
				suggestedTitle: "Onerilen Mekanlar",
				categoryPlaj: "Plaj",
				categoryParklar: "Parklar",
				categoryCultural: "Kulturel(Tarihi)",
				categoryEntertainment: "Eglence Mekanlari",
				labelCity: "Il",
				labelCategory: "Kategori",
				labelSeason: "En Iyi Zaman",
				labelAddress: "Adres",
				beach: "Plaj",
				parks: "Parklar",
				cultural: "Kulturel(Tarihi)",
				entertainment: "Eglence Mekanlari",
				resultSingular: "1 sonuc",
				resultPlural: "{count} sonuc",
				noResult: "Secimlerine uygun mekan bulunamadi.",
				loadError: "veri.json yuklenemedi. Dosyalari bir local server ile acmayi dene (ornek: Live Server).",
				closeLabel: "Kapat"
			},
			en: {
				mainTitle: "Explore Your City with Celebia",
				mainSubtitle: "Select a province and category to find the best places just for you. Browse photos, click on cards to get detailed information.",
				cityLabel: "Select Province",
				categoryLabel: "Select Category",
				allCities: "All Provinces",
				allCategories: "All Categories",
				filterBtn: "Show Places",
				suggestedTitle: "Recommended Places",
				categoryPlaj: "Beach",
				categoryParklar: "Parks",
				categoryCultural: "Cultural (Historical)",
				categoryEntertainment: "Entertainment Venues",
				labelCity: "Province",
				labelCategory: "Category",
				labelSeason: "Best Time",
				labelAddress: "Address",
				beach: "Beach",
				parks: "Parks",
				cultural: "Cultural (Historical)",
				entertainment: "Entertainment Venues",
				resultSingular: "1 result",
				resultPlural: "{count} results",
				noResult: "No places found matching your criteria.",
				loadError: "Could not load veri.json. Try opening files with a local server (e.g., Live Server).",
				closeLabel: "Close"
			}
		};

		let currentLang = localStorage.getItem("celebiaLang") || "tr";
		let allPlaces = [];

		// Çeviriler
		function t(key) {
			return translations[currentLang]?.[key] || key;
		}

		// Kategori çevirisi
		function translateCategory(cat) {
			if (currentLang === "en") {
				if (cat === "Plaj") return "Beach";
				if (cat === "Parklar") return "Parks";
				if (cat === "Kültürel(Tarihi)" || cat === "Kulturel(Tarihi)") return "Cultural (Historical)";
				if (cat === "Eğlence Mekanları" || cat === "Eglence Mekanlari") return "Entertainment Venues";
			}
			return cat;
		}

		// Aktivite çevirisi
		function translateActivity(activity) {
			const activityMap = {
				"Yuzme": "Swimming",
				"Guneslenme": "Sunbathing",
				"Sahil yuruyusu": "Beach Walk",
				"Su sporlari": "Water Sports",
				"Canli muzik": "Live Music",
				"Gece hayatı": "Nightlife",
				"Arkadas bulusmasi": "Meeting Friends",
				"VR oyunları": "VR Games",
				"Sanal gerçeklik deneyimi": "Virtual Reality Experience",
				"Teknoloji etkinlikleri": "Technology Events",
				"Eglence": "Entertainment",
				"Piknik": "Picnic",
				"Yürüyüş": "Hiking",
				"Doğa ile iç içe zaman geçirme": "Nature Time",
				"Hayvanat bahçesi": "Zoo",
				"Tarihi eserler": "Historical Artifacts",
				"Sanat eserleri": "Artworks",
				"Yerel kültür": "Local Culture",
				"Atatürk'ün yaşamı ve eserleri": "Atatürk's Life and Works",
				"Kültürel etkinlikler": "Cultural Events",
				"Arkeoloji": "Archaeology",
				"Doğa tarihi": "Natural History",
				"Biyoloji": "Biology",
				"Jeoloji": "Geology",
				"Eğitim tarihi": "History of Education",
				"Demiryolu tarihi": "Railway History",
				"Mask tarihi": "Mask History",
				"Gece Klubu": "Night Club",
				"DJ performansları": "DJ Performances",
				"Dans": "Dancing",
				"Plaj": "Beach",
				"Deniz aktiviteleri": "Water Activities"
			};
			return activityMap[activity] || activity;
		}

		// Sayfayı dil ayarlarına göre güncelle
		function updatePageLanguage() {
			document.documentElement.lang = currentLang;
			
			document.getElementById("mainTitle").textContent = t("mainTitle");
			document.getElementById("mainSubtitle").textContent = t("mainSubtitle");
			document.getElementById("cityLabel").textContent = t("cityLabel");
			document.getElementById("categoryLabel").textContent = t("categoryLabel");
			document.getElementById("filterBtn").textContent = t("filterBtn");
			document.getElementById("suggestedTitle").textContent = t("suggestedTitle");
			document.getElementById("labelCity").textContent = t("labelCity");
			document.getElementById("labelCategory").textContent = t("labelCategory");
			document.getElementById("labelSeason").textContent = t("labelSeason");
			document.getElementById("labelAddress").textContent = t("labelAddress");
			document.getElementById("closeModal").setAttribute("aria-label", t("closeLabel"));

			// Chip'leri güncelle
			document.querySelectorAll(".chip").forEach(chip => {
				const label = chip.getAttribute("data-label");
				chip.textContent = t(label);
			});

			// Select seçeneklerini güncelle
			document.querySelector("#citySelect option").textContent = t("allCities");
			const categoryOptions = document.querySelectorAll("#categorySelect option");
			categoryOptions[0].textContent = t("allCategories");
			categoryOptions[1].textContent = t("categoryPlaj");
			categoryOptions[2].textContent = t("categoryParklar");
			categoryOptions[3].textContent = t("categoryCultural");
			categoryOptions[4].textContent = t("categoryEntertainment");

			// Şehir seçeneklerini yeniden doldur
			fillCityOptions(allPlaces);
			
			// Kartları ve metaları yeniden render et
			filterPlaces();
		}

		const citySelect = document.getElementById("citySelect");
		const categorySelect = document.getElementById("categorySelect");
		const filterBtn = document.getElementById("filterBtn");
		const cardsContainer = document.getElementById("cards");
		const countText = document.getElementById("countText");
		const errorBox = document.getElementById("errorBox");
		const langSelect = document.getElementById("langSelect");

		const detailModal = document.getElementById("detailModal");
		const closeModal = document.getElementById("closeModal");

		const modalImage = document.getElementById("modalImage");
		const modalTitle = document.getElementById("modalTitle");
		const modalCity = document.getElementById("modalCity");
		const modalCategory = document.getElementById("modalCategory");
		const modalSeason = document.getElementById("modalSeason");
		const modalAddress = document.getElementById("modalAddress");
		const modalDescription = document.getElementById("modalDescription");
		const modalTags = document.getElementById("modalTags");

		// Dil değiştir
		langSelect.value = currentLang;
		langSelect.addEventListener("change", (e) => {
			currentLang = e.target.value;
			localStorage.setItem("celebiaLang", currentLang);
			updatePageLanguage();
		});

		function updateCount(value) {
			const template = value === 1 ? t("resultSingular") : t("resultPlural");
			const text = template.replace("{count}", value);
			countText.textContent = text;
		}

		function createCard(place, index) {
			const card = document.createElement("article");
			card.className = "card";
			card.style.animationDelay = `${Math.min(index * 0.06, 0.5)}s`;
			const displayCategory = translateCategory(place.kategori);
			card.innerHTML = `
				<img src="${place.kapakFoto}" alt="${place.ad}" loading="lazy">
				<div class="card-body">
					<h3>${place.ad}</h3>
					<div class="meta">
						<span>${place.il}</span>
						<span>${displayCategory}</span>
					</div>
				</div>
			`;
			card.addEventListener("click", () => openModal(place));
			return card;
		}

		function renderPlaces(list) {
			cardsContainer.innerHTML = "";
			updateCount(list.length);

			if (!list.length) {
				cardsContainer.innerHTML = `<div class="empty">${t("noResult")}</div>`;
				return;
			}

			list.forEach((place, index) => {
				cardsContainer.appendChild(createCard(place, index));
			});
		}

		function filterPlaces() {
			const city = citySelect.value;
			const category = categorySelect.value;

			const filtered = allPlaces.filter((place) => {
				const cityMatch = !city || place.il === city;
				const categoryMatch = !category || place.kategori === category;
				return cityMatch && categoryMatch;
			});

			renderPlaces(filtered);
		}

		function shufflePlaces(list) {
			const shuffled = [...list];
			for (let i = shuffled.length - 1; i > 0; i -= 1) {
				const j = Math.floor(Math.random() * (i + 1));
				[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
			}
			return shuffled;
		}

		function fillCityOptions(places) {
			// Eski seçenekleri temizle (ilk seçenek hariç)
			while (citySelect.options.length > 1) {
				citySelect.remove(1);
			}
			
			const cities = [...new Set(places.map((place) => place.il))].sort((a, b) => a.localeCompare(b, "tr"));
			cities.forEach((city) => {
				const opt = document.createElement("option");
				opt.value = city;
				opt.textContent = city;
				citySelect.appendChild(opt);
			});
		}

		function openModal(place) {
			const displayCategory = translateCategory(place.kategori);
			
			modalImage.src = place.kapakFoto;
			modalImage.alt = `${place.ad} gorseli`;
			modalTitle.textContent = place.ad;
			modalCity.textContent = place.il;
			modalCategory.textContent = displayCategory;
			modalSeason.textContent = place.enIyiZaman || "-";
			modalAddress.textContent = place.adres;
			modalDescription.textContent = place.aciklama;

			modalTags.innerHTML = "";
			(place.etkinlikler || []).forEach((item) => {
				const span = document.createElement("span");
				span.className = "tag";
				span.textContent = currentLang === "en" ? translateActivity(item) : item;
				modalTags.appendChild(span);
			});

			detailModal.classList.add("active");
			detailModal.setAttribute("aria-hidden", "false");
		}

		function closeDetailModal() {
			detailModal.classList.remove("active");
			detailModal.setAttribute("aria-hidden", "true");
		}

		async function loadData() {
			try {
				const response = await fetch("veri.json", { cache: "no-store" });
				if (!response.ok) {
					throw new Error(`Veri alinamadi: ${response.status}`);
				}
				const loadedPlaces = await response.json();
				allPlaces = shufflePlaces(loadedPlaces);
				fillCityOptions(allPlaces);
				renderPlaces(allPlaces);
			} catch (error) {
				errorBox.textContent = t("loadError");
				renderPlaces([]);
			}
		}

		filterBtn.addEventListener("click", filterPlaces);
		citySelect.addEventListener("change", filterPlaces);
		categorySelect.addEventListener("change", filterPlaces);

		closeModal.addEventListener("click", closeDetailModal);
		detailModal.addEventListener("click", (event) => {
			if (event.target === detailModal) {
				closeDetailModal();
			}
		});
		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape") {
				closeDetailModal();
			}
		});

		// Başlangıç
		updatePageLanguage();
		loadData();
	</script>
</body>
</html>
